[build]
builder = "NIXPACKS"
buildCommand = "python -m pip install --upgrade pip && python -m pip install -r apps/scoring_api/requirements.txt"

[deploy]
startCommand = "uvicorn apps.scoring_api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
